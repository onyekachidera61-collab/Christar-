version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: ludo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ludo_game
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build: .
    container_name: ludo-app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ludo_game
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - mysql
    volumes:
      - ./server:/app/server
      - ./client:/app/client

volumes:
  mysql_data:
