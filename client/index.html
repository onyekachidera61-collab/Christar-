<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Naira – Multiplayer</title>
  <link rel="stylesheet" href="ludo.css">
</head>
<body>

  <!-- ── Name-entry screen ─────────────────────────────── -->
  <div id="nameScreen" class="screen active">
    <div class="name-box">
      <div class="logo">🎲 Ludo Naira</div>
      <h2>Enter Your Name</h2>
      <input type="text" id="playerNameInput" placeholder="Your name"
             maxlength="20" autocomplete="off">
      <button id="findMatchBtn" onclick="startFindMatch()">Find Match</button>
      <p class="hint">Free 2-player match</p>
    </div>
  </div>

  <!-- ── Waiting overlay ───────────────────────────────── -->
  <div id="waitingOverlay" class="overlay hidden">
    <div class="overlay-box">
      <div class="spinner"></div>
      <p id="waitingText">Searching for opponent…</p>
      <button class="btn-secondary" onclick="cancelMatch()">Cancel</button>
    </div>
  </div>

  <!-- ── Game screen ───────────────────────────────────── -->
  <div id="gameScreen" class="screen hidden">
    <div class="game-layout">

      <!-- Player info panel -->
      <div id="playersPanel" class="players-panel"></div>

      <!-- Board + controls column -->
      <div class="board-column">
        <div id="turnIndicator" class="turn-indicator"></div>
        <div id="ludoBoard" class="ludo-board"></div>
        <div class="controls">
          <div id="diceArea" class="dice-area">
            <div class="die-wrap">
              <div id="dieEl" class="die">
                <span id="dieFace" class="die-face">🎲</span>
              </div>
            </div>
            <button id="rollBtn" class="roll-btn" onclick="onRollDice()" disabled>
              Roll Dice
            </button>
            <button id="skipBtn" class="skip-btn hidden" onclick="onSkipTurn()">
              Skip Turn
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Winner overlay ───────────────────────────────── -->
  <div id="winnerOverlay" class="overlay hidden">
    <div class="overlay-box winner-box">
      <div class="trophy">🏆</div>
      <h2 id="winnerText">Player wins!</h2>
      <button class="btn-primary" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <!-- ── Error toast ───────────────────────────────────── -->
  <div id="errorToast" class="toast hidden"></div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="ludo.js"></script>
</body>
</html>
